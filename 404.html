<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>404 - Page Not Found</h1>
        <p>The page you are looking for does not exist</p>
    </header>
    <main>
        <section>
            <h2>What happened?</h2>
            <p>The URL you requested does not match any content on this site. This custom error page is served by CloudFront with a 300-second cache TTL.</p>
        </section>
        <section>
            <h2>Go Back</h2>
            <p><a href="/index.html" style="color: #667eea; text-decoration: underline;">Return to the homepage</a></p>
        </section>
    </main>
    <footer>
        <p>Powered by Amazon S3 + CloudFront</p>
    </footer>
</body>
</html>
